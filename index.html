    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #F4F9FF; 
            --accent-blue-main: #1D4ED8;
            --accent-blue-soft: #EFF6FF;
            --accent-indigo: #4F46E5;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: #1E293B;
            margin: 0;
        }
        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
        }
        .rounded-card { border-radius: 2rem; }
        .soft-shadow { box-shadow: 0 10px 40px -10px rgba(29, 78, 216, 0.1); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in-view {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cal-day-active {
            background: var(--accent-blue-main);
            color: white;
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.3);
        }
        
        .sapphire-gradient {
            background: linear-gradient(135deg, #2563EB 0%, #1E3A8A 100%);
        }
    </style>
